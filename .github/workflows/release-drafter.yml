name: Release drafter
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  draft_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'push'
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        id: release-drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        id: release-drafter
        with:
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_semver:
    needs: publish_release
    permissions:
      contents: write
    uses: ./.github/workflows/update_semver.yml
    with:
      tag: ${{ needs.publish_release.outputs.tag_name }}

  update_release_notes:
    needs: publish_release
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/update_releasenote.yml
    with:
      to: ${{ needs.publish_release.outputs.tag_name }}
